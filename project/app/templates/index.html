<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InterviewTrainer AI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">AI interview preparation</p>
        <h1>InterviewTrainer AI</h1>
        <p class="lead">Загрузите вопросы компании, получите тест с вариантами и режим свободного ответа с AI-разбором.</p>
      </div>
      <div class="status-pill" id="apiStatus">API</div>
    </section>

    <section class="panel" id="importView">
      <div class="panel-head">
        <h2>Импорт вопросов</h2>
        <span class="muted">Текст, списки, SQL, Go/Python-код и задачи “что выведет код”.</span>
      </div>
      <textarea id="rawQuestions" spellcheck="false" placeholder="Вставьте вопросы сюда..."></textarea>
      <div class="actions">
        <button class="primary" id="generateBtn">Сгенерировать тренажёр</button>
        <span class="loader hidden" id="loader"></span>
      </div>
      <div class="error hidden" id="errorBox"></div>
    </section>

    <section class="panel hidden" id="modeView">
      <div class="panel-head">
        <h2>Режим прохождения</h2>
        <span class="muted" id="questionCount"></span>
      </div>
      <div class="mode-grid">
        <button class="mode-card" id="startTestBtn">
          <strong>Тест с вариантами</strong>
          <span>Вопросы по одному, 4 ответа, итог с ошибками.</span>
        </button>
        <button class="mode-card" id="startFreeBtn">
          <strong>Свободный ответ</strong>
          <span>Пишите ответ сами и получайте структурированный AI-разбор.</span>
        </button>
      </div>
      <label class="setting">
        Количество вопросов
        <input id="testCount" type="number" min="1" value="{{ default_count }}" />
      </label>
    </section>

    <section class="panel hidden" id="testView">
      <div class="progress"><span id="testProgress"></span><div><i id="testBar"></i></div></div>
      <article class="question-card">
        <div class="tags" id="testTags"></div>
        <div class="question-text" id="testQuestion"></div>
        <div class="options" id="testOptions"></div>
      </article>
      <div class="actions">
        <button class="primary" id="answerTestBtn">Ответить</button>
      </div>
    </section>

    <section class="panel hidden" id="freeView">
      <div class="progress"><span id="freeProgress"></span><div><i id="freeBar"></i></div></div>
      <article class="question-card">
        <div class="tags" id="freeTags"></div>
        <div class="question-text" id="freeQuestion"></div>
        <textarea id="freeAnswer" class="answer" placeholder="Ваш ответ и объяснение..."></textarea>
      </article>
      <div class="actions">
        <button class="primary" id="checkFreeBtn">Проверить</button>
        <button class="secondary hidden" id="nextFreeBtn">Следующий вопрос</button>
        <span class="loader hidden" id="freeLoader"></span>
      </div>
      <div class="review hidden" id="freeReview"></div>
    </section>

    <section class="panel hidden" id="resultView">
      <div class="panel-head">
        <h2>Итог</h2>
        <button class="secondary" id="restartBtn">Новый импорт</button>
      </div>
      <div id="resultContent"></div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
