services:
  interviewtrainer:
    build: .
    container_name: interviewtrainer-ai
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: interviewtrainer-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - interviewtrainer

volumes:
  app_data:
